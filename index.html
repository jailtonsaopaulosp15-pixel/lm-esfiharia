<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LM Esfiharia</title>

<style>
body {margin:0;font-family:Arial;background:#111;color:white;}
header {position:fixed;top:0;width:100%;background:black;z-index:10;text-align:center;}
header img {width:100%;max-height:160px;object-fit:cover;}

.tabs {
display:flex;
justify-content:space-around;
background:#222;
padding:10px;
position:sticky;
top:160px;
z-index:9;
}
.tabs button {
background:none;
border:none;
color:white;
font-size:14px;
}

.container {margin-top:200px;padding-bottom:100px;}

.card {
display:flex;
justify-content:space-between;
align-items:center;
background:#1c1c1c;
margin:10px;
padding:12px;
border-radius:10px;
}

.qtd button {
width:30px;height:30px;border:none;background:#ff9900;font-weight:bold;
}

.floating {
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
font-size:20px;
}

.badge {
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
border-radius:50%;
padding:5px;
font-size:12px;
}

.cart {
position:fixed;
bottom:-100%;
width:100%;
background:black;
padding:15px;
transition:0.3s;
max-height:80%;
overflow:auto;
}
.cart.active {bottom:0;}

.whatsapp {
width:100%;
padding:12px;
background:#25D366;
border:none;
color:white;
margin-top:10px;
}

input, textarea, select {
width:100%;
padding:8px;
margin:5px 0;
}
</style>
</head>

<body>

<header>
<img src="https://i.imgur.com/5KXcV7Y.jpg">
</header>

<div class="tabs">
<button onclick="mostrar('premium')">Premium</button>
<button onclick="mostrar('tradicional')">Tradicionais</button>
<button onclick="mostrar('doce')">Doces</button>
</div>

<div class="container" id="menu"></div>

<div class="floating" onclick="toggleCart()">
🛒 <span class="badge" id="count">0</span>
</div>

<div class="cart" id="cart">
<h3>Seu Pedido</h3>
<div id="itens"></div>

<textarea id="obs" placeholder="Observação (ex: sem cebola)"></textarea>

<p>Taxa: R$ 4</p>
<p>Total: R$ <span id="total">0</span></p>

<input id="nome" placeholder="Seu nome">
<input id="endereco" placeholder="Endereço">

<select id="pagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>

<button class="whatsapp" onclick="enviar()">Enviar no WhatsApp</button>
</div>

<script>
const numero="5516996055175";
const taxa=4;

const cardapio={
premium:[["Costela",12],["Carne Seca",12],["Strogonoff Carne",15],["Strogonoff Frango",15]],
tradicional:[["Calabresa",7],["Muçarela",7],["Frango c/ Catupiry",7.5],["Carne",7]],
doce:[["Chocolate",9],["Banana",8],["Prestígio",8]]
};

let carrinho={};

function mostrar(cat){
let html="";
cardapio[cat].forEach((p,i)=>{
html+=`
<div class="card">
<div><b>${p[0]}</b><br>R$ ${p[1]}</div>
<div class="qtd">
<button onclick="menos('${cat}',${i})">-</button>
<span id="${cat}${i}">0</span>
<button onclick="mais('${cat}',${i})">+</button>
</div>
</div>`;
});
document.getElementById("menu").innerHTML=html;
}

function mais(c,i){carrinho[c+i]=(carrinho[c+i]||0)+1;update();}
function menos(c,i){if(carrinho[c+i])carrinho[c+i]--;update();}

function update(){
let total=0,count=0,itens="";
for(let key in carrinho){
if(carrinho[key]>0){
let cat=key.replace(/[0-9]/g,'');
let idx=key.replace(/\D/g,'');
let p=cardapio[cat][idx];
itens+=`${carrinho[key]}x ${p[0]}<br>`;
total+=p[1]*carrinho[key];
count+=carrinho[key];
document.getElementById(cat+idx).innerText=carrinho[key];
}
}
document.getElementById("total").innerText=(total+taxa).toFixed(2);
document.getElementById("count").innerText=count;
document.getElementById("itens").innerHTML=itens;
}

function toggleCart(){document.getElementById("cart").classList.toggle("active");}

function enviar(){
let nome=document.getElementById("nome").value;
let endereco=document.getElementById("endereco").value;
let pagamento=document.getElementById("pagamento").value;
let obs=document.getElementById("obs").value;

let msg=`Pedido LM Esfiharia\n\nNome: ${nome}\nEndereço: ${endereco}\n\n`;

let total=0;

for(let key in carrinho){
if(carrinho[key]>0){
let cat=key.replace(/[0-9]/g,'');
let idx=key.replace(/\D/g,'');
let p=cardapio[cat][idx];
msg+=`${carrinho[key]}x ${p[0]}\n`;
total+=p[1]*carrinho[key];
}
}

msg+=`\nObs: ${obs}`;
msg+=`\nTaxa: R$ ${taxa}`;
msg+=`\nTotal: R$ ${(total+taxa).toFixed(2)}`;
msg+=`\nPagamento: ${pagamento}`;

window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
}

mostrar('premium');
</script>

</body>
</html>
