<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LM Esfiharia</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:#fff}

header{
background:#000;
padding:12px;
text-align:center;
font-size:20px;
font-weight:bold;
position:sticky;
top:0;
z-index:10;
}

h2{
padding:10px;
color:#ff9900;
margin:0;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
padding:10px;
}

.card{
background:#1c1c1c;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.info{padding:10px}

.nome{font-size:14px}
.desc{font-size:12px;color:#aaa}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:5px;
}

.preco{color:#ff9900;font-weight:bold}

.add{
background:#ff9900;
border:none;
padding:5px 10px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.floating{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
font-size:20px;
}

.badge{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:#fff;
border-radius:50%;
padding:4px 6px;
font-size:12px;
}

.cart{
position:fixed;
right:-100%;
top:0;
width:300px;
height:100%;
background:#000;
padding:15px;
transition:0.3s;
overflow:auto;
}
.cart.active{right:0}

.whatsapp{
width:100%;
padding:10px;
background:#25D366;
border:none;
color:#fff;
margin-top:10px;
}

.tag{
position:absolute;
background:red;
padding:3px 6px;
font-size:10px;
border-radius:5px;
top:5px;
left:5px;
}
</style>
</head>

<body>

<header>🔥 LM Esfiharia</header>

<div id="menu"></div>

<div class="floating" onclick="toggleCart()">
🛒 <span class="badge" id="count">0</span>
</div>

<div class="cart" id="cart">
<h3>Seu Pedido</h3>
<div id="itens"></div>

<p>Taxa: R$ 4</p>
<p>Total: R$ <span id="total">0</span></p>

<input id="nome" placeholder="Seu nome">
<input id="endereco" placeholder="Endereço">

<select id="pagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>

<button class="whatsapp" onclick="enviar()">Enviar Pedido</button>
</div>

<script>
const numero="5516996055175";
const taxa=4;

const cardapio={
premium:[
{name:"Costela",price:12,img:"costela.jpg",top:true},
{name:"Carne Seca",price:12,img:"carne-seca.jpg"},
{name:"Strogonoff",price:15,img:"strogonoff.jpg"}
],

tradicional:[
{name:"Frango",price:7.5,img:"frango.jpg"},
{name:"Calabresa",price:7,img:"calabresa.jpg"}
],

doce:[
{name:"Chocolate",price:9,img:"chocolate.jpg"}
]
};

let carrinho={};

function carregar(){
let html="";

for(let categoria in cardapio){

html+=`<h2>${categoria.toUpperCase()}</h2>`;
html+=`<div class="grid">`;

cardapio[categoria].forEach((p,i)=>{
html+=`
<div class="card">
${p.top?'<div class="tag">MAIS VENDIDO</div>':''}
<img src="${p.img}">
<div class="info">
<div class="nome">${p.name}</div>
<div class="desc">Esfiha artesanal</div>

<div class="bottom">
<span class="preco">R$ ${p.price}</span>
<button class="add" onclick="add('${categoria}',${i})">+</button>
</div>
</div>
</div>
`;
});

html+=`</div>`;
}

document.getElementById("menu").innerHTML=html;
}

function add(cat,i){
let key=cat+"-"+i;
carrinho[key]=(carrinho[key]||0)+1;
update();
}

function update(){
let total=0,count=0,itens="";

for(let key in carrinho){
if(carrinho[key]>0){

let [cat,i]=key.split("-");
let p=cardapio[cat][i];

itens+=`${carrinho[key]}x ${p.name}<br>`;
total+=p.price*carrinho[key];
count+=carrinho[key];
}
}

document.getElementById("total").innerText=(total+taxa).toFixed(2);
document.getElementById("count").innerText=count;
document.getElementById("itens").innerHTML=itens;
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

function enviar(){
let nome=document.getElementById("nome").value;
let endereco=document.getElementById("endereco").value;
let pagamento=document.getElementById("pagamento").value;

let msg=`Pedido LM Esfiharia\n\nNome: ${nome}\nEndereço: ${endereco}\n\n`;

let total=0;

for(let key in carrinho){
if(carrinho[key]>0){
let [cat,i]=key.split("-");
let p=cardapio[cat][i];

msg+=`${carrinho[key]}x ${p.name}\n`;
total+=p.price*carrinho[key];
}
}

msg+=`\nTaxa: R$ ${taxa}`;
msg+=`\nTotal: R$ ${(total+taxa).toFixed(2)}`;
msg+=`\nPagamento: ${pagamento}`;

window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
}

carregar();
</script>

</body>
</html>
