<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LM Esfiharia</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#111;
    color:white;
}

/* TOPO */
header {
    background: linear-gradient(90deg,#ff0000,#ff9900);
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

/* CATEGORIA */
.categoria {
    margin:20px;
    font-size:22px;
    color:#ff9900;
}

/* CARD PRODUTO */
.card {
    display:flex;
    align-items:center;
    background:#1c1c1c;
    margin:10px 15px;
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card img {
    width:70px;
    height:70px;
    border-radius:10px;
    margin-right:10px;
}

.info {
    flex:1;
}

.preco {
    color:#00ff88;
    font-weight:bold;
}

/* QUANTIDADE */
.qtd {
    display:flex;
    align-items:center;
}

.qtd button {
    width:30px;
    height:30px;
    border:none;
    background:#ff9900;
    color:black;
    font-weight:bold;
    border-radius:5px;
}

.qtd span {
    margin:0 8px;
}

/* CARRINHO */
.cart {
    position:fixed;
    bottom:0;
    width:100%;
    background:#000;
    padding:15px;
    box-shadow:0 -2px 10px black;
}

input {
    width:100%;
    padding:8px;
    margin:5px 0;
}

.total {
    font-size:18px;
    margin:5px 0;
}

.whatsapp {
    width:100%;
    padding:12px;
    background:#25D366;
    border:none;
    font-size:16px;
    color:white;
    border-radius:8px;
}
</style>
</head>

<body>

<header>🔥 LM Esfiharia</header>

<div id="menu"></div>

<div class="cart">
<div id="resumo"></div>

<p>Taxa de entrega: R$ 5,00</p>
<p class="total">Total: R$ <span id="total">0</span></p>

<input id="nome" placeholder="Seu nome">
<input id="endereco" placeholder="Endereço">

<select id="pagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>

<button class="whatsapp" onclick="enviarPedido()">Enviar Pedido no WhatsApp</button>
</div>

<script>
const numero = "5516996055175";
const taxa = 5;

const produtos = [
{nome:"Costela", preco:12, img:"https://i.imgur.com/5KXcV7Y.jpg"},
{nome:"Carne Seca", preco:12, img:"https://i.imgur.com/5KXcV7Y.jpg"},
{nome:"Strogonoff", preco:15, img:"https://i.imgur.com/5KXcV7Y.jpg"},
{nome:"Frango", preco:7.5, img:"https://i.imgur.com/5KXcV7Y.jpg"},
{nome:"Calabresa", preco:7, img:"https://i.imgur.com/5KXcV7Y.jpg"},
{nome:"Chocolate", preco:9, img:"https://i.imgur.com/5KXcV7Y.jpg"}
];

let carrinho = {};

function carregar(){
const menu = document.getElementById("menu");

produtos.forEach((p,i)=>{
menu.innerHTML += `
<div class="card">
<img src="${p.img}">
<div class="info">
<b>${p.nome}</b><br>
<span class="preco">R$ ${p.preco}</span>
</div>

<div class="qtd">
<button onclick="menos(${i})">-</button>
<span id="q${i}">0</span>
<button onclick="mais(${i})">+</button>
</div>
</div>
`;
});
}

function mais(i){
carrinho[i] = (carrinho[i] || 0) + 1;
atualizar();
}

function menos(i){
if(carrinho[i]){
carrinho[i]--;
}
atualizar();
}

function atualizar(){
let total = 0;

for(let i in carrinho){
let qtd = carrinho[i];
document.getElementById("q"+i).innerText = qtd;

total += produtos[i].preco * qtd;
}

document.getElementById("total").innerText = (total + taxa).toFixed(2);
}

function enviarPedido(){
let nome = document.getElementById("nome").value;
let endereco = document.getElementById("endereco").value;
let pagamento = document.getElementById("pagamento").value;

let msg = `Pedido LM Esfiharia\n\n`;
msg += `Nome: ${nome}\nEndereço: ${endereco}\n\n`;

let total = 0;

for(let i in carrinho){
if(carrinho[i] > 0){
msg += `${carrinho[i]}x ${produtos[i].nome}\n`;
total += produtos[i].preco * carrinho[i];
}
}

msg += `\nTaxa: R$ ${taxa}`;
msg += `\nTotal: R$ ${(total+taxa).toFixed(2)}`;
msg += `\nPagamento: ${pagamento}`;

window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
}

carregar();
</script>

</body>
</html>
